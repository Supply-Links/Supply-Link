name: Deploy Contract to Testnet

on:
  push:
    branches: [main]
    paths:
      - "smart-contract/**"

jobs:
  deploy:
    name: Build & Deploy Soroban Contract
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smart-contract/target
          key: cargo-${{ hashFiles('smart-contract/Cargo.lock') }}

      - name: Build contract WASM
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: smart-contract

      - name: Install Stellar CLI
        run: |
          curl -sSL https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Import deployer account
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          stellar keys add deployer --secret-key "$STELLAR_SECRET_KEY"

      - name: Deploy contract
        id: deploy
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm smart-contract/target/wasm32-unknown-unknown/release/supply_link.wasm \
            --network testnet \
            --source deployer \
            --ignore-checks)
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed contract: $CONTRACT_ID"

      - name: Post contract ID as commit comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Testnet deployment successful**\n\nNew contract ID: \`${{ steps.deploy.outputs.contract_id }}\`\n\nUpdate \`NEXT_PUBLIC_CONTRACT_ID\` in your Vercel environment variables.`
            });
