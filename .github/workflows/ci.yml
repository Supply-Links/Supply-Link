name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  env-check:
    name: Required Env Variables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required env vars are documented in .env.example
        run: |
          required_vars=(
            "NEXT_PUBLIC_CONTRACT_ID"
            "NEXT_PUBLIC_STELLAR_NETWORK"
          )
          missing=0
          for var in "${required_vars[@]}"; do
            if ! grep -q "^${var}=" frontend/.env.example; then
              echo "❌ Missing from frontend/.env.example: ${var}"
              missing=1
            else
              echo "✅ ${var}"
            fi
          done
          exit $missing

  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint:ci

      - name: TypeScript check
        run: npx tsc --noEmit
